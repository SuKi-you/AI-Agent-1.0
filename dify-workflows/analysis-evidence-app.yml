    - data:
        code: "def main(old_state: object, new_patch: str):\n    import json\n   \
          \ import re\n\n    if not old_state:\n        old_state = {}\n\n    if isinstance(old_state,\
          \ str):\n        try:\n            old_state = json.loads(old_state)\n \
          \       except Exception:\n            old_state = {}\n\n    if not new_patch:\n\
          \        new_patch = \"{}\"\n\n    if isinstance(new_patch, str):\n    \
          \    # 去掉可能的 <think>...</think>\n        new_patch = re.sub(r\"<think>.*?</think>\"\
          , \"\", new_patch, flags=re.S).strip()\n\n        # 提取第一个 JSON 对象\n    \
          \    match = re.search(r\"\\{.*\\}\", new_patch, flags=re.S)\n        if\
          \ match:\n            new_patch = match.group(0)\n        else:\n      \
          \      new_patch = \"{}\"\n\n        try:\n            new_patch = json.loads(new_patch)\n\
          \        except Exception:\n            new_patch = {}\n\n    def deep_merge(old,\
          \ new):\n        for k, v in new.items():\n            if isinstance(v,\
          \ dict) and isinstance(old.get(k), dict):\n                old[k] = deep_merge(old[k],\
          \ v)\n            else:\n                old[k] = v\n        return old\n\
          \n    merged = deep_merge(old_state, new_patch)\n\n    return {\n      \
          \  \"merged_state\": merged\n    }"
